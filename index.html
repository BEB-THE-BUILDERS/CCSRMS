<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS Room Management — Login</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1b3e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CCSRMS">
    <link rel="apple-touch-icon" href="logo-192.png">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #020c1f;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(13, 60, 120, 0.5) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(5, 30, 80, 0.4) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.97);
            width: 100%;
            max-width: 440px;
            padding: 44px 40px 36px;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
            animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .brand-logo {
            width: 52px; height: 52px;
            background: #0d1b3e;
            border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        .brand-logo svg { width: 26px; height: 26px; fill: none; stroke: #fff; stroke-width: 1.8; }
        .brand h1 {
            font-family: 'Sora', sans-serif;
            font-size: 1.35rem;
            color: #0d1b3e;
            letter-spacing: -0.3px;
        }
        .brand p {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 3px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 7px;
            font-size: 0.85rem;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap .icon-left {
            position: absolute;
            left: 12px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px;
            stroke: #94a3b8; fill: none; stroke-width: 1.8;
            pointer-events: none;
        }
        input {
            width: 100%;
            padding: 11px 12px 11px 38px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #1e293b;
            background: #f8fafc;
        }
        input:focus {
            border-color: #0d1b3e;
            box-shadow: 0 0 0 3px rgba(13,27,62,0.08);
            background: #fff;
        }
        /* Password field has extra right padding for the toggle button */
        #password {
            padding-right: 40px;
        }
        .toggle-password {
            position: absolute;
            right: 10px; top: 50%; transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8;
            border-radius: 4px;
            transition: color 0.2s;
        }
        .toggle-password:hover { color: #475569; }
        .toggle-password svg {
            width: 17px; height: 17px;
            fill: none; stroke: currentColor; stroke-width: 1.8;
            pointer-events: none;
        }
        /* Hide the "crossed" path by default; show when active */
        .toggle-password .eye-off { display: none; }
        .toggle-password.visible .eye-on  { display: none; }
        .toggle-password.visible .eye-off { display: block; }
        .info-box {
            background: #eff6ff;
            border-left: 3px solid #3b82f6;
            color: #1e40af;
            padding: 12px 14px;
            border-radius: 0 8px 8px 0;
            font-size: 0.8rem;
            line-height: 1.5;
            margin: 20px 0;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }
        .btn-login {
            flex: 2;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #0d1b3e;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-login:hover { background: #1a3060; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-cancel {
            flex: 1;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            color: #64748b;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-cancel:hover { background: #f1f5f9; }
        .error-msg {
            display: none;
            background: #fef2f2;
            border-left: 3px solid #ef4444;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
            font-size: 0.82rem;
            margin-bottom: 16px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .error-msg.show { display: block; }
        .logo {
            height: 80px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="brand-logo">
                <img src="logo.png" class="logo">
            </div>
            <h1>Welcome!</h1>
            <p>Log in to your account</p>
        </div>


        <div id="errorMsg" class="error-msg"></div>


        <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
                <svg class="icon-left" viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <input type="email" id="email" placeholder="e.g. admin@school.edu" autocomplete="email">
            </div>
        </div>


        <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrap">
                <svg class="icon-left" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                <!-- Eye toggle button -->
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                    <!-- Eye open (default) -->
                    <svg class="eye-on" viewBox="0 0 24 24">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <!-- Eye with slash (when visible) -->
                    <svg class="eye-off" viewBox="0 0 24 24">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
        </div>


        <div style="text-align:right;margin-top:-8px;margin-bottom:4px;">
            <button type="button" id="forgotPasswordLink" style="background:none;border:none;color:#1d4ed8;font-size:0.8rem;font-family:'DM Sans',sans-serif;cursor:pointer;padding:0;font-weight:600;text-decoration:underline;text-underline-offset:2px;">Forgot password?</button>
        </div>

        <div class="info-box">
            <strong>Note:</strong> The Admin will have full access to create and manage schedules.
        </div>


        <div class="button-group">
            <button class="btn-login" id="loginBtn">
                <span class="spinner"></span>
                <span class="btn-text">Log In</span>
            </button>
        </div>
    </div>


    <!-- Forgot Password Modal Overlay -->
    <div id="forgotOverlay" style="display:none;position:fixed;inset:0;background:rgba(2,12,31,0.75);z-index:1000;align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.2s ease;">
        <div id="forgotCard" style="background:#fff;width:100%;max-width:420px;padding:40px 36px 32px;border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,0.5);position:relative;animation:cardIn 0.35s cubic-bezier(0.22,1,0.36,1) both;">
            <!-- Close button -->
            <button id="forgotCloseBtn" type="button" style="position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;border:none;background:#f1f5f9;color:#64748b;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.2s;" onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='#f1f5f9'">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>

            <!-- Icon + heading -->
            <div style="display:flex;align-items:center;gap:14px;margin-bottom:22px;">
                <div style="width:46px;height:46px;background:#eff6ff;border-radius:12px;display:flex;align-items:center;justify-content:center;border:1.5px solid #93c5fd;flex-shrink:0;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1d4ed8" stroke-width="1.8"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                </div>
                <div>
                    <div style="font-family:'Sora',sans-serif;font-size:1.05rem;font-weight:700;color:#0d1b3e;">Reset Password</div>
                    <div style="font-size:0.78rem;color:#64748b;margin-top:2px;">We'll send a reset link to your email</div>
                </div>
            </div>

            <!-- Panels: input vs success -->
            <div id="forgotInputPanel">
                <div style="margin-bottom:14px;">
                    <label style="display:block;font-size:0.83rem;font-weight:600;color:#1e293b;margin-bottom:7px;">Email Address</label>
                    <div style="position:relative;">
                        <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;stroke:#94a3b8;fill:none;stroke-width:1.8;pointer-events:none;" viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                        <input type="email" id="forgotEmail" placeholder="Enter your account email" autocomplete="email" style="width:100%;padding:11px 12px 11px 36px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.88rem;font-family:'DM Sans',sans-serif;outline:none;color:#1e293b;background:#f8fafc;transition:border-color 0.2s,box-shadow 0.2s;" onfocus="this.style.borderColor='#0d1b3e';this.style.boxShadow='0 0 0 3px rgba(13,27,62,0.08)';this.style.background='#fff';" onblur="this.style.borderColor='#e2e8f0';this.style.boxShadow='none';this.style.background='#f8fafc';">
                    </div>
                </div>
                <div id="forgotError" style="display:none;background:#fef2f2;border-left:3px solid #ef4444;color:#dc2626;padding:9px 12px;border-radius:0 7px 7px 0;font-size:0.8rem;margin-bottom:12px;"></div>
                <div style="display:flex;gap:10px;margin-top:6px;">
                    <button id="forgotCancelBtn" type="button" style="flex:1;padding:11px;border:1.5px solid #e2e8f0;border-radius:8px;background:#fff;color:#64748b;font-family:'DM Sans',sans-serif;font-weight:600;font-size:0.88rem;cursor:pointer;transition:background 0.2s;" onmouseover="this.style.background='#f1f5f9'" onmouseout="this.style.background='#fff'">Cancel</button>
                    <button id="forgotSendBtn" type="button" style="flex:2;padding:11px;border:none;border-radius:8px;background:#0d1b3e;color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.2s;" onmouseover="this.style.background='#1a3060'" onmouseout="this.style.background='#0d1b3e'">
                        <span id="forgotBtnSpinner" style="display:none;width:15px;height:15px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;"></span>
                        <span id="forgotBtnText">Send Reset Link</span>
                    </button>
                </div>
            </div>

            <!-- Success state -->
            <div id="forgotSuccessPanel" style="display:none;text-align:center;padding:10px 0 4px;">
                <div style="width:56px;height:56px;background:#f0fdf4;border-radius:50%;border:2px solid #86efac;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
                    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.2"><polyline points="20 6 9 17 4 12"/></svg>
                </div>
                <div style="font-family:'Sora',sans-serif;font-size:1rem;font-weight:700;color:#0d1b3e;margin-bottom:8px;">Check your inbox!</div>
                <div id="forgotSuccessMsg" style="font-size:0.83rem;color:#64748b;line-height:1.6;margin-bottom:20px;"></div>
                <button id="forgotDoneBtn" type="button" style="padding:10px 28px;border:none;border-radius:8px;background:#0d1b3e;color:#fff;font-family:'DM Sans',sans-serif;font-weight:700;font-size:0.88rem;cursor:pointer;transition:background 0.2s;" onmouseover="this.style.background='#1a3060'" onmouseout="this.style.background='#0d1b3e'">Back to Login</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yfeibchcqhkcsutpctiw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmZWliY2hjcWhrY3N1dHBjdGl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTE1NDcsImV4cCI6MjA5MjI2NzU0N30.ICh4YZv1Da5D3BdKK6oKSuBBBZ0YOor3Mnz2iLSou9o';


        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);


        const loginBtn    = document.getElementById('loginBtn');
        const errorMsg    = document.getElementById('errorMsg');
        const toggleBtn   = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');


        // --- Password visibility toggle ---
        toggleBtn.addEventListener('click', () => {
            const isVisible = passwordInput.type === 'text';
            passwordInput.type = isVisible ? 'password' : 'text';
            toggleBtn.classList.toggle('visible', !isVisible);
            toggleBtn.setAttribute('aria-label', isVisible ? 'Show password' : 'Hide password');
        });


        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }


        function hideError() {
            errorMsg.classList.remove('show');
        }


        (async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) window.location.href = 'home.html';
        })();


        loginBtn.addEventListener('click', async () => {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;


            hideError();


            if (!email || !password) {
                showError('Please fill in both email and password.');
                return;
            }


            loginBtn.classList.add('loading');
            loginBtn.disabled = true;


            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });


            loginBtn.classList.remove('loading');
            loginBtn.disabled = false;


            if (error) {
                showError(error.message || 'Login failed. Please check your credentials.');
            } else {
                window.location.href = 'home.html';
            }
        });


        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        // ── Forgot Password ──
        const forgotOverlay   = document.getElementById('forgotOverlay');
        const forgotInputPanel  = document.getElementById('forgotInputPanel');
        const forgotSuccessPanel = document.getElementById('forgotSuccessPanel');
        const forgotError     = document.getElementById('forgotError');
        const forgotEmail     = document.getElementById('forgotEmail');
        const forgotBtnSpinner = document.getElementById('forgotBtnSpinner');
        const forgotBtnText   = document.getElementById('forgotBtnText');

        function openForgot() {
            forgotEmail.value = document.getElementById('email').value.trim() || '';
            forgotError.style.display = 'none';
            forgotInputPanel.style.display = 'block';
            forgotSuccessPanel.style.display = 'none';
            forgotOverlay.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            setTimeout(() => forgotEmail.focus(), 100);
        }
        function closeForgot() {
            forgotOverlay.style.display = 'none';
            document.body.style.overflow = '';
        }

        document.getElementById('forgotPasswordLink').addEventListener('click', openForgot);
        document.getElementById('forgotCloseBtn').addEventListener('click', closeForgot);
        document.getElementById('forgotCancelBtn').addEventListener('click', closeForgot);
        document.getElementById('forgotDoneBtn').addEventListener('click', closeForgot);
        forgotOverlay.addEventListener('click', (e) => { if (e.target === forgotOverlay) closeForgot(); });

        document.getElementById('forgotSendBtn').addEventListener('click', async () => {
            const email = forgotEmail.value.trim();
            forgotError.style.display = 'none';

            if (!email) {
                forgotError.textContent = 'Please enter your email address.';
                forgotError.style.display = 'block'; return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                forgotError.textContent = 'Please enter a valid email address.';
                forgotError.style.display = 'block'; return;
            }

            forgotBtnSpinner.style.display = 'block';
            forgotBtnText.textContent = 'Sending…';
            document.getElementById('forgotSendBtn').disabled = true;

            const { error } = await _supabase.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + '/home.html'
            });

            forgotBtnSpinner.style.display = 'none';
            forgotBtnText.textContent = 'Send Reset Link';
            document.getElementById('forgotSendBtn').disabled = false;

            if (error) {
                forgotError.textContent = error.message || 'Something went wrong. Please try again.';
                forgotError.style.display = 'block';
            } else {
                document.getElementById('forgotSuccessMsg').textContent =
                    'A password reset link has been sent to ' + email + '. Please check your inbox (and spam folder).';
                forgotInputPanel.style.display = 'none';
                forgotSuccessPanel.style.display = 'block';
            }
        });

        forgotEmail.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('forgotSendBtn').click();
        });

        // ── Register Service Worker (PWA) ──
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
