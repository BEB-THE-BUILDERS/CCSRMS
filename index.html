<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCS Room Management — Login</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d1b3e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CCSRMS">
    <link rel="apple-touch-icon" href="logo-192.png">

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background-color: #020c1f;
            background-image:
                radial-gradient(ellipse 80% 60% at 50% -10%, rgba(13, 60, 120, 0.5) 0%, transparent 70%),
                radial-gradient(ellipse 40% 40% at 80% 80%, rgba(5, 30, 80, 0.4) 0%, transparent 60%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255,255,255,0.97);
            width: 100%;
            max-width: 440px;
            padding: 44px 40px 36px;
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08);
            animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .brand {
            text-align: center;
            margin-bottom: 28px;
        }
        .brand-logo {
            width: 52px; height: 52px;
            background: #0d1b3e;
            border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 12px;
        }
        .brand-logo svg { width: 26px; height: 26px; fill: none; stroke: #fff; stroke-width: 1.8; }
        .brand h1 {
            font-family: 'Sora', sans-serif;
            font-size: 1.35rem;
            color: #0d1b3e;
            letter-spacing: -0.3px;
        }
        .brand p {
            font-size: 0.8rem;
            color: #64748b;
            margin-top: 3px;
        }
        .input-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 7px;
            font-size: 0.85rem;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap .icon-left {
            position: absolute;
            left: 12px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px;
            stroke: #94a3b8; fill: none; stroke-width: 1.8;
            pointer-events: none;
        }
        input {
            width: 100%;
            padding: 11px 12px 11px 38px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            color: #1e293b;
            background: #f8fafc;
        }
        input:focus {
            border-color: #0d1b3e;
            box-shadow: 0 0 0 3px rgba(13,27,62,0.08);
            background: #fff;
        }
        /* Password field has extra right padding for the toggle button */
        #password {
            padding-right: 40px;
        }
        .toggle-password {
            position: absolute;
            right: 10px; top: 50%; transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8;
            border-radius: 4px;
            transition: color 0.2s;
        }
        .toggle-password:hover { color: #475569; }
        .toggle-password svg {
            width: 17px; height: 17px;
            fill: none; stroke: currentColor; stroke-width: 1.8;
            pointer-events: none;
        }
        /* Hide the "crossed" path by default; show when active */
        .toggle-password .eye-off { display: none; }
        .toggle-password.visible .eye-on  { display: none; }
        .toggle-password.visible .eye-off { display: block; }
        .info-box {
            background: #eff6ff;
            border-left: 3px solid #3b82f6;
            color: #1e40af;
            padding: 12px 14px;
            border-radius: 0 8px 8px 0;
            font-size: 0.8rem;
            line-height: 1.5;
            margin: 20px 0;
        }
        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 6px;
        }
        .btn-login {
            flex: 2;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #0d1b3e;
            color: white;
            font-weight: 700;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-login:hover { background: #1a3060; }
        .btn-login:active { transform: scale(0.98); }
        .btn-login .spinner {
            display: none;
            width: 16px; height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn-cancel {
            flex: 1;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            background: white;
            color: #64748b;
            font-weight: 600;
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-cancel:hover { background: #f1f5f9; }
        .error-msg {
            display: none;
            background: #fef2f2;
            border-left: 3px solid #ef4444;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: 0 8px 8px 0;
            font-size: 0.82rem;
            margin-bottom: 16px;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .error-msg.show { display: block; }
        .logo {
            height: 80px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand">
            <div class="brand-logo">
                <img src="logo.png" class="logo">
            </div>
            <h1>Welcome!</h1>
            <p>Log in to your account</p>
        </div>


        <div id="errorMsg" class="error-msg"></div>


        <div class="input-group">
            <label for="email">Email Address</label>
            <div class="input-wrap">
                <svg class="icon-left" viewBox="0 0 24 24"><path d="M4 4h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <input type="email" id="email" placeholder="e.g. admin@school.edu" autocomplete="email">
            </div>
        </div>


        <div class="input-group">
            <label for="password">Password</label>
            <div class="input-wrap">
                <svg class="icon-left" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                <!-- Eye toggle button -->
                <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                    <!-- Eye open (default) -->
                    <svg class="eye-on" viewBox="0 0 24 24">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                        <circle cx="12" cy="12" r="3"/>
                    </svg>
                    <!-- Eye with slash (when visible) -->
                    <svg class="eye-off" viewBox="0 0 24 24">
                        <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                        <line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                </button>
            </div>
        </div>


        <div class="info-box">
            <strong>Note:</strong> The Admin will have full access to create and manage schedules.
        </div>


        <div class="button-group">
            <button class="btn-login" id="loginBtn">
                <span class="spinner"></span>
                <span class="btn-text">Log In</span>
            </button>
        </div>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://yfeibchcqhkcsutpctiw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlmZWliY2hjcWhrY3N1dHBjdGl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2OTE1NDcsImV4cCI6MjA5MjI2NzU0N30.ICh4YZv1Da5D3BdKK6oKSuBBBZ0YOor3Mnz2iLSou9o';


        const { createClient } = supabase;
        const _supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);


        const loginBtn    = document.getElementById('loginBtn');
        const errorMsg    = document.getElementById('errorMsg');
        const toggleBtn   = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');


        // --- Password visibility toggle ---
        toggleBtn.addEventListener('click', () => {
            const isVisible = passwordInput.type === 'text';
            passwordInput.type = isVisible ? 'password' : 'text';
            toggleBtn.classList.toggle('visible', !isVisible);
            toggleBtn.setAttribute('aria-label', isVisible ? 'Show password' : 'Hide password');
        });


        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }


        function hideError() {
            errorMsg.classList.remove('show');
        }


        (async () => {
            const { data: { session } } = await _supabase.auth.getSession();
            if (session) window.location.href = 'home.html';
        })();


        loginBtn.addEventListener('click', async () => {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;


            hideError();


            if (!email || !password) {
                showError('Please fill in both email and password.');
                return;
            }


            loginBtn.classList.add('loading');
            loginBtn.disabled = true;


            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });


            loginBtn.classList.remove('loading');
            loginBtn.disabled = false;


            if (error) {
                showError(error.message || 'Login failed. Please check your credentials.');
            } else {
                window.location.href = 'home.html';
            }
        });


        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        // ── Register Service Worker (PWA) ──
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW registered:', reg.scope))
                    .catch(err => console.warn('SW registration failed:', err));
            });
        }
    </script>
</body>
</html>
